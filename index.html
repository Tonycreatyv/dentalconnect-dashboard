<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>DentalConnect - Asistente de Clínica Dental</title>

    <!-- Open Graph / Facebook / Messenger -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dental.creatyv.io/" />
    <meta property="og:title" content="DentalConnect - Tu Asistente de Clínica Dental" />
    <meta property="og:description" content="Automatiza mensajes, agenda citas y reduce no-shows. Prueba gratis 14 días." />
    <meta property="og:image" content="https://dental.creatyv.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="DentalConnect by Creatyv" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DentalConnect - Tu Asistente de Clínica Dental" />
    <meta name="twitter:description" content="Automatiza mensajes, agenda citas y reduce no-shows. Prueba gratis 14 días." />
    <meta name="twitter:image" content="https://dental.creatyv.io/og-image.png" />

    <!-- SEO -->
    <meta name="description" content="DentalConnect automatiza la comunicación de tu clínica dental. Responde mensajes, agenda citas y envía recordatorios automáticamente." />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0b0b" />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DentalConnect" />

    <!-- Mobile Optimizations -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("✅ Service Worker registrado:", registration);
            })
            .catch((error) => {
              console.log("❌ Error registrando Service Worker:", error);
            });
        });
      }
    </script>
  </body>
</html>
